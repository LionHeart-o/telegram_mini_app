<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>案件报告生成器</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root {
            --tg-theme-bg-color: #ffffff;
            --tg-theme-text-color: #222222;
            --tg-theme-hint-color: #999999;
            --tg-theme-button-color: #248bed;
            --tg-theme-secondary-bg-color: #efeff4;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
            margin: 0; padding: 15px;
        }
        .section { margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { display: block; font-weight: bold; margin: 10px 0 5px; font-size: 14px; }

        /* 输入框样式 */
        input[type="text"], input[type="date"], textarea {
            width: 100%; padding: 10px; border: 1px solid #ccc;
            border-radius: 8px; box-sizing: border-box; font-size: 16px;
            background-color: var(--tg-theme-bg-color);
            color: var(--tg-theme-text-color);
        }

        /* 只读输入框样式 */
        input[readonly] {
            background-color: var(--tg-theme-secondary-bg-color);
            color: var(--tg-theme-hint-color);
            border-color: #ddd;
            cursor: not-allowed;
        }

        /* 评分滑动条样式 */
        .score-row { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        input[type="range"] { flex: 1; }
        .score-val { font-weight: bold; color: var(--tg-theme-button-color); width: 25px; }

        .btn-group { margin-top: 20px; }
        button {
            width: 100%; padding: 15px; border: none; border-radius: 10px;
            background-color: var(--tg-theme-button-color); color: white;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>

<div id="report-form">
    <div class="section">
        <label>案件信息</label>
        <input type="text" id="loc" placeholder="案件发生地">
        <input type="text" id="name" placeholder="嫌疑人姓名" style="margin-top:5px;">
        <label>日期</label>
        <input type="date" id="date">
        <label>消费金额</label>
        <input type="text" id="cost" placeholder="例如：1500">
    </div>

    <div class="section">
        <label>评分项目 (0-10分)</label>
        <div class="score-row"><span>人照:</span> <input type="range" id="match" min="0" max="10" value="8"> <span class="score-val" id="v-match">8</span></div>
        <div class="score-row"><span>颜值:</span> <input type="range" id="face" min="0" max="10" value="6" step="0.5"> <span class="score-val" id="v-face">6</span></div>
        <div class="score-row"><span>身材:</span> <input type="range" id="body" min="0" max="10" value="8"> <span class="score-val" id="v-body">8</span></div>
        <div class="score-row"><span>性格:</span> <input type="range" id="char" min="0" max="10" value="8"> <span class="score-val" id="v-char">8</span></div>
        <div class="score-row"><span>上路:</span> <input type="range" id="top" min="0" max="10" value="8"> <span class="score-val" id="v-top">8</span></div>
        <div class="score-row"><span>中路:</span> <input type="range" id="mid" min="0" max="10" value="8"> <span class="score-val" id="v-mid">8</span></div>
        <div class="score-row"><span>综合:</span> <input type="range" id="total" min="0" max="10" value="8"> <span class="score-val" id="v-total">8</span></div>
    </div>

    <div class="section">
        <label>文字描述</label>
        <textarea id="desc" rows="4" placeholder="详细体验描述..."></textarea>
        <label>名侦探🕵️ (自动识别)</label>
        <input type="text" id="detective" readonly>
        <label>店家联系方式</label>
        <input type="text" id="contact" placeholder="微信号/手机号">
    </div>

    <div class="btn-group">
        <button onclick="generateReport()">生成报告并发送</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // 初始化获取用户信息
    function initUser() {
        const user = tg.initDataUnsafe?.user;
        let displayName = "未知侦探";

        if (user) {
            // 优先级：1. First + Last Name, 2. Username, 3. ID
            const fullName = [user.first_name, user.last_name].filter(Boolean).join(" ");
            if (fullName) {
                displayName = fullName;
            } else if (user.username) {
                displayName = "@" + user.username;
            } else {
                displayName = "ID: " + user.id;
            }
        }
        document.getElementById('detective').value = displayName;
    }

    initUser();

    // 实时显示滑动条数值
    document.querySelectorAll('input[type="range"]').forEach(input => {
        if (input.id === 'face') {
            input.oninput = function() {
                const value = parseFloat(this.value);
                
                // 限制最高分为8.5
                if (value > 8.5) {
                    this.value = 8.5;
                    document.getElementById('v-face').innerText = '8.5';
                    return;
                }
                
                // 低于5分的提示
                if (value < 5) {
                    alert('😆 有福了，吃这么好');
                }
                
                // 高于8分的确认框
                if (value > 8) {
                    const confirm1 = confirm('你不是又在乱给分吧？');
                    if (!confirm1) {
                        this.value = 6;
                        document.getElementById('v-face').innerText = '6';
                        return;
                    }
                    
                    const confirm2 = confirm('你确定她长得像网红？');
                    if (!confirm2) {
                        this.value = 6;
                        document.getElementById('v-face').innerText = '6';
                        return;
                    }
                    
                    const confirm3 = confirm('真拿你没办法');
                    if (!confirm3) {
                        this.value = 6;
                        document.getElementById('v-face').innerText = '6';
                        return;
                    }
                }
                
                document.getElementById('v-' + this.id).innerText = this.value;
            };
        } else {
            input.oninput = function() {
                document.getElementById('v-' + this.id).innerText = this.value;
            };
        }
    });

    // 默认日期设为今天
    document.getElementById('date').valueAsDate = new Date();

    function generateReport() {
        const data = {
            loc: document.getElementById('loc').value || "未填写",
            name: document.getElementById('name').value || "未填写",
            date: document.getElementById('date').value,
            cost: document.getElementById('cost').value || "0",
            match: document.getElementById('match').value,
            face: document.getElementById('face').value,
            body: document.getElementById('body').value,
            char: document.getElementById('char').value,
            top: document.getElementById('top').value,
            mid: document.getElementById('mid').value,
            total: document.getElementById('total').value,
            desc: document.getElementById('desc').value || "无",
            detective: document.getElementById('detective').value,
            contact: document.getElementById('contact').value || "未填写"
        };

        const report = `#案件发生地 #${data.loc}
#嫌疑人姓名 #${data.name}
#日期 ${data.date}
#消费 ${data.cost}
#人照符合度 ${data.match}
#颜值 ${data.face}
#身材 ${data.body}
#性格 ${data.char}
#上路 ${data.top}
#中路 ${data.mid}
#综合评价 ${data.total}
#详细体验
${data.desc}

#名侦探🕵️ ${data.detective}
#店家联系方式: ${data.contact}

报告审核: @limanman886 @bayesprism
侦探事务所: https://t.me/sz_mmk7
侦探事务所卷宗: https://t.me/sz_mmk_jz`;

        tg.sendData(report);
    }
</script>
</body>
</html>
